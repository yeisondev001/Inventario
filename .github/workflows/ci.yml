name: CI/CD - Build and Deploy

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore InventarioApi.sln

    - name: Build
      run: dotnet build InventarioApi.sln --no-restore

    - name: Test
      run: dotnet test InventarioApi.Tests/InventarioApi.Tests.csproj --no-build --verbosity normal

    - name: Publish
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: dotnet publish InventarioApi.csproj -c Release -o ./publish

    - name: Upload build artifacts
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: inventariapi-publish
        path: ./publish/
        retention-days: 7

    - name: Deploy to MonsterASP via SCP
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 22
        source: "publish/*"
        target: "/wwwroot/"
        strip_components: 0
