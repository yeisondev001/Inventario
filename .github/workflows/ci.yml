name: CI/CD - Build and Publish

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore InventarioApi.sln

    - name: Build
      run: dotnet build InventarioApi.sln --no-restore

    - name: Test
      run: dotnet test InventarioApi.Tests/InventarioApi.Tests.csproj --no-build --verbosity normal

    - name: Publish
      run: dotnet publish InventarioApi.csproj -c Release -o ./publish

    - name: Copy wwwroot contents to publish root
      run: |
        cp -r wwwroot/. publish/
        ls -la publish/

    - name: Deploy to publish branch
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./publish
        publish_branch: publish
        force_orphan: true
        enable_jekyll: false
