name: CI/CD - Build and Publish

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore InventarioApi.sln

    - name: Build
      run: dotnet build InventarioApi.sln --no-restore

    - name: Test
      run: dotnet test InventarioApi.Tests/InventarioApi.Tests.csproj --no-build --verbosity normal

    - name: Publish
      run: dotnet publish InventarioApi.csproj -c Release -o ./publish

    - name: Copy wwwroot contents to publish root
      run: |
        cp -r wwwroot/. publish/
        ls -la publish/

    - name: Deploy to publish branch
      run: |
        cd publish
        git init
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Deploy: archivos compilados"
        git branch -M publish
        git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        git push origin publish --force
